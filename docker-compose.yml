version: '3.8'

services:
  # PostgreSQL database with pgvector extension for embeddings
  db:
    image: pgvector/pgvector:pg16
    container_name: besbpo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: besbpo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./besbpo-blog-architecture/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./besbpo-blog-architecture/db/seed_divisions.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: besbpo-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # CMS API - NestJS backend (on port 3001)
  cms-api:
    build:
      context: ./besbpo-blog-cms-api
      dockerfile: Dockerfile
    container_name: besbpo-cms-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/besbpo
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: besbpo
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      PASSWORD_RESET_TOKEN_EXPIRY: 3600
      RATE_LIMIT_TTL: 900
      RATE_LIMIT_MAX: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./besbpo-blog-cms-api:/app
      - /app/node_modules
    command: npm run start:dev

  # Editorial Dashboard - Next.js server (on port 3000)
  editorial-dashboard:
    build:
      context: ./besbpo-editorial-dashboard
      dockerfile: Dockerfile
    container_name: besbpo-editorial-dashboard
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      CMS_API_URL: http://cms-api:3001
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      cms-api:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./besbpo-editorial-dashboard:/app
      - /app/node_modules
    command: npm run dev

  # Blog Web - Next.js public blog (on port 3002)
  blog-web:
    build:
      context: ./besbpo-blog-web
      dockerfile: Dockerfile.dev
    container_name: besbpo-blog-web
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SEARCH_API_URL: http://localhost:8080
      NEXT_PUBLIC_SYNDICATION_URL: http://localhost:8080
    depends_on:
      cms-api:
        condition: service_started
    volumes:
      - ./besbpo-blog-web:/app
      - /app/node_modules
    command: npm run dev

  # Syndication Service - Node.js syndication API (on port 8080)
  syndication-svc:
    build:
      context: ./besbpo-blog-syndication-svc
      dockerfile: Dockerfile
    container_name: besbpo-syndication-svc
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/besbpo
      REDIS_URL: redis://redis:6379
      ADMIN_JWT_SECRET: dev-secret-change-in-production
      SERVICE_JWT_SECRET: dev-secret-change-in-production
      PORT: 8080
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./besbpo-blog-syndication-svc:/app

  # Intelligence Service - Python FastAPI (on port 8000)
  intelligence-svc:
    build:
      context: ./besbpo-blog-intelligence-svc
      dockerfile: Dockerfile
    container_name: besbpo-intelligence-svc
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      LOG_LEVEL: INFO
    volumes:
      - ./besbpo-blog-intelligence-svc:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redisdata:
