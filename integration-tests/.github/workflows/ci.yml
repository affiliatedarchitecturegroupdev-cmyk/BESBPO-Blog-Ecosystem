# Integration Tests CI Workflow
# Reference: Master Plan Section 7

name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Unit and Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # PostgreSQL
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: besbpo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: integration-tests/package-lock.json

      - name: Install dependencies
        working-directory: integration-tests
        run: npm ci

      - name: Set environment variables
        run: |
          echo "CMS_API_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "SYNDICATION_API_URL=http://localhost:8080" >> $GITHUB_ENV
          echo "INTELLIGENCE_API_URL=http://localhost:8000" >> $GITHUB_ENV
          echo "TEST_DB_HOST=localhost" >> $GITHUB_ENV
          echo "TEST_REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Run tests
        working-directory: integration-tests
        run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: integration-tests/coverage
          retention-days: 7

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: integration-tests/*.log
          retention-days: 7

  # Load Tests (only on main branch)
  load-test:
    name: Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Load Tests
        run: |
          k6 run --out json=load-test-results.json integration-tests/load-tests/k6-config.js
        env:
          BASE_URL: ${{ vars.STAGING_API_URL }}

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.json
          retention-days: 30

      - name: Analyze Results
        run: |
          # Check for failures
          if grep -q '"level":"error"' load-test-results.json; then
            echo "Errors found in load test results"
            exit 1
          fi

  # E2E Tests (Browser)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: integration-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: integration-tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: |
          npm run docker:up
          sleep 30
          npx playwright test
          npm run docker:down
