name: Build and deploy blog.besbpo.co.za
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [besbpo-content-update]   # fired by besbpo-blog-syndication-svc on publish (Doc-02 Section 7)
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: blog.besbpo.co.za
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: besbpo-blog-web/package-lock.json
      - run: npm ci
        working-directory: besbpo-blog-web
      - run: npm run build
        env:
          CMS_API_BASE_URL: ${{ secrets.CMS_API_BASE_URL }}
        working-directory: besbpo-blog-web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: besbpo-blog-web/out
      - id: deployment
        uses: actions/deploy-pages@v4
