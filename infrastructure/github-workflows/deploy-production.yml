# Production Deployment Workflow with OIDC
# Reference: Master Plan Section 4
#
# Usage: Copy to .github/workflows/deploy-production.yml in target repository
# Requires manual approval for production deployments

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: production
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # Require manual approval for production
  approval:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deployment approved"

  deploy:
    runs-on: ubuntu-latest
    needs: approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configure AWS OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Build and push to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest

      # Deploy to ECS
      - name: Update ECS service
        run: |
          aws ecs update-service --cluster besbpo-production --service ${{ vars.ECS_SERVICE }} --force-new-deployment

      # Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_PRODUCTION }} --paths "/*"

      - name: Notify deployment
        run: |
          echo "✅ Deployment to production complete!"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"

  rollback:
    runs-on: ubuntu-latest
    if: failure() && needs.deploy.result == 'failure'
    steps:
      - name: Rollback ECS service
        run: |
          echo "⚠️ Production deployment failed!"
          echo "Manual intervention may be required."
          aws ecs update-service --cluster besbpo-production --service ${{ vars.ECS_SERVICE }} --force-new-deployment
